<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real or AI?</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Real or AI?</h1>
      <p class="subtitle">Can you tell the difference?</p>
    </header>

    <section id="start-screen" class="screen">
      <p>You'll see a series of images. For each one, decide: is it a <strong>real photo</strong>, or was it <strong>generated by AI</strong>?</p>
      <button id="start-btn" class="btn btn-primary">Start Game</button>
    </section>

    <section id="game-screen" class="screen hidden">
      <div class="hud">
        <div class="hud-item">Round <span id="round-num">1</span> / <span id="round-total">10</span></div>
        <div class="hud-item">Score: <span id="score">0</span></div>
      </div>

      <div class="image-wrap">
        <img id="game-image" alt="Guess if this is real or AI" />
        <div id="image-loading" class="loading">Loading...</div>
      </div>

      <div class="choices">
        <button id="choose-real" class="btn btn-choice">Real</button>
        <button id="choose-ai" class="btn btn-choice">AI</button>
      </div>

      <div id="feedback" class="feedback hidden">
        <p id="feedback-text"></p>
        <p id="feedback-caption" class="caption"></p>
        <button id="next-btn" class="btn btn-primary">Next</button>
      </div>
    </section>

    <section id="end-screen" class="screen hidden">
      <h2>Final Score</h2>
      <p class="final-score"><span id="final-score">0</span> / <span id="final-total">10</span></p>
      <p id="final-message"></p>
      <button id="play-again-btn" class="btn btn-primary">Play Again</button>
    </section>
  </main>

  <footer>
    <p>A game for humans learning to spot AI.</p>
  </footer>

  <script src="images.js"></script>
  <script src="game.js"></script>
</body>
</html>
